<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaojin vs. The Olives</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #a370f7; /* Twitch Purple */
            text-shadow: 0 0 10px rgba(163, 112, 247, 0.5);
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 800px;
            padding: 10px;
            background: #222;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 18px;
        }
        canvas {
            background: #18181c;
            display: block;
        }
        .instructions {
            margin-top: 10px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>VAOJIN VS THE OLIVES</h1>
    <div id="game-container">
        <div id="ui">
            <div>Vaojin HP: <span id="player-hp">100</span>%</div>
            <div>Boss HP: <span id="boss-hp">500</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
    <div class="instructions">
        W, A, S, D or arrow keys to move | Left click to shoot swear words
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Game Engine Management ---
let gameState = 'start'; // Possible states: 'start', 'playing', 'gameover', 'victory'

// --- Game Objects & State ---
let player = { 
    x: 400, 
    y: 400, 
    size: 40, 
    speed: 5, 
    hp: 100,
    img: null 
};

let boss = { 
    x: 400, 
    y: 80, 
    size: 45, 
    hp: 500, 
    maxHp: 500, 
    speedX: 3, 
    attackTimer: 0 
};

let bullets = [];      
let olives = [];       
let keys = {};
let mouse = { x: 0, y: 0 };

// Start Button Geometry (for the click boundary)
const startBtn = { x: 300, y: 280, w: 200, h: 50 };

// --- Setup Player Model Image ---
player.img = new Image();
player.img.src = 'vaojin.png'; 

// --- Swear Word Projectile Dictionary ---
const swearWords = ["$#!*%", "@&#!", "*CENSORED*", "🤬", "#$%@!!"];

// --- Input Event Listeners ---
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

// Click Interaction Handler
canvas.addEventListener('mousedown', () => {
    // 1. Start Screen Interaction
    if (gameState === 'start') {
        if (mouse.x >= startBtn.x && mouse.x <= startBtn.x + startBtn.w &&
            mouse.y >= startBtn.y && mouse.y <= startBtn.y + startBtn.h) {
            gameState = 'playing';
        }
        return;
    }

    // 2. Restart Engine Handler
    if (gameState === 'gameover' || gameState === 'victory') {
        resetGame();
        gameState = 'playing';
        return;
    }

    // 3. Normal Gameplay Shooting Behavior
    if (gameState === 'playing') {
        const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        const text = swearWords[Math.floor(Math.random() * swearWords.length)];
        
        bullets.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(angle) * 8,
            vy: Math.sin(angle) * 8,
            text: text
        });
    }
});

// Reset function to clear parameters upon death/victory
function resetGame() {
    player.x = 400;
    player.y = 400;
    player.hp = 100;
    boss.x = 400;
    boss.y = 80;
    boss.hp = 500;
    boss.attackTimer = 0;
    bullets = [];
    olives = [];
    document.getElementById('player-hp').innerText = 100;
    document.getElementById('boss-hp').innerText = 500;
}

// --- Game Logic Updates ---
function update() {
    if (gameState !== 'playing') return;

    // 1. Player Movement Engine
    if (keys['w'] || keys['arrowup']) player.y = Math.max(player.size, player.y - player.speed);
    if (keys['s'] || keys['arrowdown']) player.y = Math.min(canvas.height - player.size, player.y + player.speed);
    if (keys['a'] || keys['arrowleft']) player.x = Math.max(player.size, player.x - player.speed);
    if (keys['d'] || keys['arrowright']) player.x = Math.min(canvas.width - player.size, player.x + player.speed);

    // 2. Boss Behavior (Side-to-Side Patrol)
    boss.x += boss.speedX;
    if (boss.x > canvas.width - boss.size || boss.x < boss.size) {
        boss.speedX *= -1;
    }

    // 3. Boss Attack Engine (Targeted Shooting at the Player)
    boss.attackTimer++;
    if (boss.attackTimer % 35 === 0) { 
        // Track targeted angle directly toward Vaojin's position
        let angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
        let oliveSpeed = 5;

        olives.push({
            x: boss.x,
            y: boss.y + boss.size,
            vx: Math.cos(angleToPlayer) * oliveSpeed,
            vy: Math.sin(angleToPlayer) * oliveSpeed
        });
    }

    // 4. Handle Swear Word Physics & Hitboxes
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;

        let dist = Math.hypot(b.x - boss.x, b.y - boss.y);
        if (dist < boss.size) {
            boss.hp -= 10;
            document.getElementById('boss-hp').innerText = Math.max(0, boss.hp);
            bullets.splice(i, 1);
            
            if (boss.hp <= 0) {
                gameState = 'victory';
            }
            continue;
        }

        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    }

    // 5. Handle Olive Physics & Damage Hitboxes
    for (let i = olives.length - 1; i >= 0; i--) {
        let o = olives[i];
        o.x += o.vx;
        o.y += o.vy;

        let dist = Math.hypot(o.x - player.x, o.y - player.y);
        if (dist < player.size) {
            player.hp -= 5;
            document.getElementById('player-hp').innerText = Math.max(0, player.hp);
            olives.splice(i, 1);

            if (player.hp <= 0) {
                gameState = 'gameover';
            }
            continue;
        }

        // Clean out olives that miss and fly off any screen boundary
        if (o.y > canvas.height || o.y < 0 || o.x < 0 || o.x > canvas.width) {
            olives.splice(i, 1);
        }
    }
}

// --- Rendering / Drawing ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- STATE: START SCREEN ---
    if (gameState === 'start') {
        // Title Screen Text
        ctx.fillStyle = '#a370f7';
        ctx.font = 'bold 32px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("press the fucking button to start", canvas.width / 2, 180);

        // Click Button Background box
        ctx.fillStyle = '#333';
        ctx.strokeStyle = '#a370f7';
        ctx.lineWidth = 2;
        ctx.fillRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h);
        ctx.strokeRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h);

        // Button label text
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Courier New';
        ctx.fillText("PRESS START", canvas.width / 2, startBtn.y + 32);
        return;
    }

    // --- STATE: GAME OVER SCREEN ---
    if (gameState === 'gameover') {
        ctx.fillStyle = '#ff4444';
        ctx.font = '36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("GAME OVER - THE OLIVES WON", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '18px Courier New';
        ctx.fillStyle = '#aaa';
        ctx.fillText("Click anywhere to retry", canvas.width / 2, canvas.height / 2 + 30);
        return;
    }

    // --- STATE: VICTORY SCREEN ---
    if (gameState === 'victory') {
        ctx.fillStyle = '#44ff44';
        ctx.font = '36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("VICTORY! VAOJIN SMASHED THE OLIVES!", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '18px Courier New';
        ctx.fillStyle = '#aaa';
        ctx.fillText("Click anywhere to play again", canvas.width / 2, canvas.height / 2 + 30);
        return;
    }

    // --- STATE: ACTIVE GAMEPLAY RENDERING ---
    // Draw Boss (Giant Stuffed Olive)
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI * 2);
    ctx.fillStyle = '#4A5D4E'; 
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.size * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#d32f2f'; 
    ctx.fill();

    // Draw Player Model (Vaojin)
    if (player.img.complete && player.img.naturalWidth !== 0) {
        ctx.save();
        ctx.translate(player.x, player.y);
        let angleToMouse = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        ctx.rotate(angleToMouse + Math.PI / 2); 
        ctx.drawImage(player.img, -player.size, -player.size, player.size * 2, player.size * 2);
        ctx.restore();
    } else {
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fillStyle = '#a370f7';
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '12px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("Loading...", player.x, player.y + 4);
    }

    // Draw Swear Word Projectiles
    ctx.fillStyle = '#ffeb3b';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    bullets.forEach(b => {
        ctx.fillText(b.text, b.x, b.y);
    });

    // Draw Enemy Olive Projectiles
    olives.forEach(o => {
        ctx.beginPath();
        ctx.arc(o.x, o.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#556B2F';
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(o.x, o.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ff1744';
        ctx.fill();
    });
}

// --- Main Engine Animation Loop ---
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Initialization Call
loop();
</script>
</body>
</html>
